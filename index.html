<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stronghold Reborn</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(rgba(15, 12, 8, 0.55), rgba(10, 8, 5, 0.75)),
                        url('https://raw.githubusercontent.com/StrongholdReborn/stronghold-reborn/main/background.jpg') center/cover fixed;
            background-attachment: fixed;
            color: #ffeb9e;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(25, 20, 15, 0.94);
            border: 6px solid #d4af37;
            border-image: linear-gradient(#ffe8a8, #d4af37, #b8860b) 1;
            border-radius: 18px;
            padding: 45px 50px;           /* Reduced padding */
            max-width: 560px;             /* Made card narrower */
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.9),
                        inset 0 0 100px rgba(255, 235, 158, 0.1);
        }
        h1 {
            color: #ffeb9e;
            font-size: 2.8em;             /* Slightly smaller title */
            margin: 0 0 8px 0;
            text-shadow: 0 6px 16px rgba(0,0,0,0.95),
                         0 0 30px rgba(255, 235, 158, 0.65);
            letter-spacing: 4px;
        }
        .subtitle {
            color: #e8c070;
            font-size: 1.35em;
            margin-bottom: 40px;
            letter-spacing: 5px;
        }
        .info {
            font-size: 1.55em;
            margin: 28px 0;
        }
        .label {
            color: #f0d48c;
            font-size: 1.05em;
            display: block;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        strong {
            color: #fff8d6;
            font-size: 1.65em;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
        }
        button {
            margin-top: 40px;
            padding: 16px 48px;
            font-size: 1.2em;
            background: linear-gradient(#f0d48c, #d4af37);
            color: #2c2118;
            border: 3px solid #b8860b;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(0,0,0,0.7);
        }
        button:hover {
            background: linear-gradient(#ffe8a8, #f0d48c);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Stronghold Reborn</h1>
        <div class="subtitle">PRIVATE EDITION • TEST WORLD</div>
        
        <div class="info">
            <span class="label">ACTIVE PLAYERS</span> 
            <strong>65</strong>
        </div>
        <div class="info">
            <span class="label">DAYS SINCE START</span> 
            <strong>272</strong>
        </div>
        <div class="info">
            <span class="label">HOUSES LEFT IN GLORY RACE</span> 
            <strong>16</strong>
        </div>
        <div class="info">
            <span class="label">CURRENT AGE</span> 
            <strong>2nd Age</strong>
        </div>
        
        <button onclick="alert('Live data is currently blocked by CORS.\nWe are waiting for the server owner to enable it.')">
            REFRESH DATA
        </button>
        
        <p style="margin-top: 40px; color: #b89a6e; font-size: 0.95em;">
            Showing latest known values from the test world.<br>
            Live updates will be enabled soon.
        </p>
    </div>
</body>
</html>
