<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stronghold Reborn</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(rgba(12, 10, 7, 0.65), rgba(8, 6, 4, 0.82)),
                        url('https://raw.githubusercontent.com/StrongholdReborn/stronghold-reborn/main/background.jpg') center/cover fixed;
            background-attachment: fixed;
            color: #ffeb9e;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: linear-gradient(#2c2218, #1a140f);
            border: 7px solid #d4af37;
            border-image: linear-gradient(#ffe8a8, #d4af37, #8b5a2b, #d4af37) 1;
            border-radius: 20px;
            padding: 50px 55px;
            max-width: 520px;
            box-shadow: 
                0 40px 90px rgba(0, 0, 0, 0.95),
                inset 0 0 80px rgba(255, 235, 158, 0.15),
                inset 0 0 40px rgba(139, 90, 43, 0.3);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border: 2px solid #ffeb9e;
            border-radius: 20px;
            opacity: 0.25;
            pointer-events: none;
        }
        h1 {
            color: #ffeb9e;
            font-size: 2.85em;
            margin: 0 0 12px 0;
            text-shadow: 0 6px 15px rgba(0,0,0,0.95),
                         0 0 30px rgba(255, 235, 158, 0.75);
            letter-spacing: 4px;
            font-weight: bold;
        }
        .subtitle {
            color: #e8c070;
            font-size: 1.25em;
            margin-bottom: 45px;
            letter-spacing: 5px;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
        }
        .info {
            font-size: 1.48em;
            margin: 30px 0;
        }
        .label {
            color: #d4af37;
            font-size: 1.0em;
            display: block;
            margin-bottom: 8px;
            letter-spacing: 2.5px;
            font-weight: normal;
        }
        strong {
            color: #fff8d6;
            font-size: 1.58em;
            text-shadow: 3px 3px 8px rgba(0,0,0,0.85);
        }
        button {
            margin-top: 45px;
            padding: 16px 48px;
            font-size: 1.15em;
            background: linear-gradient(#d4af37, #b8860b);
            color: #2c2118;
            border: 3px solid #ffe8a8;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(0,0,0,0.7);
            transition: all 0.2s;
        }
        button:hover {
            background: linear-gradient(#ffe8a8, #d4af37);
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(212, 175, 55, 0.6);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Stronghold Reborn</h1>
        <div class="subtitle">PRIVATE EDITION • TEST WORLD</div>
        
        <div class="info">
            <span class="label">ACTIVE PLAYERS</span> 
            <strong>65</strong>
        </div>
        <div class="info">
            <span class="label">DAYS SINCE START</span> 
            <strong>272</strong>
        </div>
        <div class="info">
            <span class="label">HOUSES LEFT IN GLORY RACE</span> 
            <strong>16</strong>
        </div>
        <div class="info">
            <span class="label">CURRENT AGE</span> 
            <strong>2nd Age</strong>
        </div>
        
        <button onclick="alert('Live data is currently blocked by CORS.\nWe are waiting for the server owner to enable it.')">
            REFRESH DATA
        </button>
        
        <p style="margin-top: 40px; color: #b89a6e; font-size: 0.95em;">
            Showing latest known values from the test world.<br>
            Live updates will be enabled soon.
        </p>
    </div>
</body>
</html>
