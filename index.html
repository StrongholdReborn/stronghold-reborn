<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stronghold Reborn</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: url('https://raw.githubusercontent.com/StrongholdReborn/stronghold-reborn/main/background.jpg') center/cover fixed;
            color: white;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(0, 0, 0, 0.75);
            border: 3px solid #ffd700;
            border-radius: 12px;
            padding: 25px 40px;
            max-width: 380px;
            width: 100%;
        }
        h1 {
            font-size: 2.2em;
            margin: 0 0 15px 0;
            color: #ffd700;
        }
        .subtitle {
            font-size: 1.1em;
            margin-bottom: 25px;
            color: #ffcc66;
        }
        .info {
            margin: 18px 0;
            font-size: 1.25em;
        }
        .label {
            font-size: 0.95em;
            color: #ccc;
            margin-bottom: 4px;
        }
        button {
            margin-top: 25px;
            padding: 12px 30px;
            font-size: 1.1em;
            background: #ffd700;
            color: black;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Stronghold Reborn</h1>
        <div class="subtitle">PRIVATE EDITION • TEST WORLD</div>
        
        <div class="info">
            <div class="label">ACTIVE PLAYERS</div>
            <strong>65</strong>
        </div>
        <div class="info">
            <div class="label">DAYS SINCE START</div>
            <strong>272</strong>
        </div>
        <div class="info">
            <div class="label">HOUSES LEFT IN GLORY RACE</div>
            <strong>16</strong>
        </div>
        <div class="info">
            <div class="label">CURRENT AGE</div>
            <strong>2nd Age</strong>
        </div>
        
        <button onclick="alert('Live data coming soon')">REFRESH DATA</button>
    </div>
</body>
</html>
