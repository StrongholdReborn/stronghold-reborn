<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stronghold Reborn</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(rgba(15, 12, 8, 0.6), rgba(10, 8, 5, 0.75)),
                        url('https://picsum.photos/id/1015/1920/1080') center/cover fixed;
            color: #ffeb9e;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(25, 20, 15, 0.94);
            border: 6px solid #d4af37;
            border-image: linear-gradient(#ffe8a8, #d4af37, #b8860b) 1;
            border-radius: 18px;
            padding: 65px 60px;
            max-width: 740px;
            box-shadow: 0 35px 80px rgba(0, 0, 0, 0.9),
                        inset 0 0 120px rgba(255, 235, 158, 0.1);
        }
        h1 {
            color: #ffeb9e;
            font-size: 3.4em;
            margin: 0 0 10px 0;
            text-shadow: 0 6px 16px rgba(0,0,0,0.95),
                         0 0 35px rgba(255, 235, 158, 0.65);
            letter-spacing: 5px;
        }
        .subtitle {
            color: #e8c070;
            font-size: 1.5em;
            margin-bottom: 55px;
            letter-spacing: 6px;
            font-weight: normal;
        }
        .info {
            font-size: 1.7em;
            margin: 36px 0;
        }
        .label {
            color: #f0d48c;
            font-size: 1.1em;
            display: block;
            margin-bottom: 10px;
            letter-spacing: 2.5px;
        }
        strong {
            color: #fff8d6;
            font-size: 1.75em;
            text-shadow: 3px 3px 8px rgba(0,0,0,0.8);
        }
        button {
            margin-top: 50px;
            padding: 18px 52px;
            font-size: 1.3em;
            background: linear-gradient(#f0d48c, #d4af37);
            color: #2c2118;
            border: 3px solid #b8860b;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
        }
        button:hover {
            background: linear-gradient(#ffe8a8, #f0d48c);
            transform: translateY(-4px);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Stronghold Reborn</h1>
        <div class="subtitle">PRIVATE EDITION • TEST WORLD</div>
        
        <div class="info">
            <span class="label">ACTIVE PLAYERS</span> 
            <strong>65</strong>
        </div>
        <div class="info">
            <span class="label">DAYS SINCE START</span> 
            <strong>272</strong>
        </div>
        <div class="info">
            <span class="label">HOUSES LEFT IN GLORY RACE</span> 
            <strong>16</strong>
        </div>
        <div class="info">
            <span class="label">CURRENT AGE</span> 
            <strong>2nd Age</strong>
        </div>
        
        <button onclick="alert('Live data is currently blocked by CORS.\n\nWe are waiting for the server owner to enable it.')">
            REFRESH DATA
        </button>
        
        <p style="margin-top: 50px; color: #b89a6e; font-size: 1em;">
            Showing latest known values from the test world.<br>
            Live updates will be enabled soon.
        </p>
    </div>
</body>
</html>
