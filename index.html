<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stronghold Reborn</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(rgba(20, 18, 12, 0.45), rgba(15, 12, 8, 0.65)),
                        url('https://raw.githubusercontent.com/StrongholdReborn/stronghold-reborn/main/background.jpg') center/cover fixed;
            background-attachment: fixed;
            color: #ffeb9e;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(28, 22, 15, 0.88);
            border: 6px solid #d4af37;
            border-image: linear-gradient(to bottom, #ffe8a8, #d4af37, #b8860b) 1;
            border-radius: 18px;
            padding: 48px 52px;
            max-width: 500px;
            box-shadow: 
                0 35px 85px rgba(0, 0, 0, 0.92),
                inset 0 0 90px rgba(255, 235, 158, 0.18),
                inset 0 0 50px rgba(139, 90, 43, 0.25);
        }
        h1 {
            color: #ffeb9e;
            font-size: 2.9em;
            margin: 0 0 10px 0;
            text-shadow: 0 6px 14px rgba(0,0,0,0.95),
                         0 0 28px rgba(255, 235, 158, 0.75);
            letter-spacing: 4px;
        }
        .subtitle {
            color: #e8c070;
            font-size: 1.3em;
            margin-bottom: 42px;
            letter-spacing: 5px;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
        }
        .info {
            font-size: 1.52em;
            margin: 30px 0;
        }
        .label {
            color: #e8c070;
            font-size: 1.05em;
            display: block;
            margin-bottom: 8px;
            letter-spacing: 2.2px;
        }
        strong {
            color: #fff8d6;
            font-size: 1.62em;
            text-shadow: 3px 3px 7px rgba(0,0,0,0.8);
        }
        button {
            margin-top: 42px;
            padding: 16px 46px;
            font-size: 1.18em;
            background: linear-gradient(#d4af37, #b8860b);
            color: #2c2118;
            border: 3px solid #ffe8a8;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 8px 22px rgba(0,0,0,0.7);
        }
        button:hover {
            background: linear-gradient(#ffe8a8, #d4af37);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Stronghold Reborn</h1>
        <div class="subtitle">PRIVATE EDITION • TEST WORLD</div>
        
        <div class="info">
            <span class="label">ACTIVE PLAYERS</span> 
            <strong>65</strong>
        </div>
        <div class="info">
            <span class="label">DAYS SINCE START</span> 
            <strong>272</strong>
        </div>
        <div class="info">
            <span class="label">HOUSES LEFT IN GLORY RACE</span> 
            <strong>16</strong>
        </div>
        <div class="info">
            <span class="label">CURRENT AGE</span> 
            <strong>2nd Age</strong>
        </div>
        
        <button onclick="alert('Live data is currently blocked by CORS.\nWe are waiting for the server owner to enable it.')">
            REFRESH DATA
        </button>
        
        <p style="margin-top: 40px; color: #d4af37; font-size: 0.95em;">
            Showing latest known values from the test world.<br>
            Live updates will be enabled soon.
        </p>
    </div>
</body>
</html>
