<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stronghold Reborn</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(rgba(18, 15, 10, 0.35), rgba(12, 10, 7, 0.55)),
                        url('https://raw.githubusercontent.com/StrongholdReborn/stronghold-reborn/main/background.jpg') center/cover fixed;
            background-attachment: fixed;
            color: #ffeb9e;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(32, 26, 19, 0.82);
            border: 6px solid #e8c070;
            border-image: linear-gradient(#ffe8a8, #e8c070, #d4af37) 1;
            border-radius: 20px;
            padding: 48px 55px;
            max-width: 500px;
            box-shadow: 
                0 30px 75px rgba(0, 0, 0, 0.85),
                inset 0 0 90px rgba(255, 235, 158, 0.25),
                inset 0 0 45px rgba(212, 175, 55, 0.2);
        }
        h1 {
            color: #ffeb9e;
            font-size: 2.85em;
            margin: 0 0 10px 0;
            text-shadow: 0 6px 15px rgba(0,0,0,0.9),
                         0 0 32px rgba(255, 235, 158, 0.8);
            letter-spacing: 4px;
        }
        .subtitle {
            color: #f0d48c;
            font-size: 1.32em;
            margin-bottom: 42px;
            letter-spacing: 5px;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.75);
        }
        .info {
            font-size: 1.55em;
            margin: 30px 0;
        }
        .label {
            color: #f0d48c;
            font-size: 1.05em;
            display: block;
            margin-bottom: 7px;
            letter-spacing: 2.5px;
        }
        strong {
            color: #fff8d6;
            font-size: 1.68em;
            text-shadow: 3px 3px 8px rgba(0,0,0,0.8);
        }
        button {
            margin-top: 45px;
            padding: 16px 48px;
            font-size: 1.18em;
            background: linear-gradient(#ffe8a8, #d4af37);
            color: #2c2118;
            border: 3px solid #e8c070;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 8px 22px rgba(0,0,0,0.7);
        }
        button:hover {
            background: linear-gradient(#fff0c8, #ffe8a8);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Stronghold Reborn</h1>
        <div class="subtitle">PRIVATE EDITION • TEST WORLD</div>
        
        <div class="info">
            <span class="label">ACTIVE PLAYERS</span> 
            <strong>65</strong>
        </div>
        <div class="info">
            <span class="label">DAYS SINCE START</span> 
            <strong>272</strong>
        </div>
        <div class="info">
            <span class="label">HOUSES LEFT IN GLORY RACE</span> 
            <strong>16</strong>
        </div>
        <div class="info">
            <span class="label">CURRENT AGE</span> 
            <strong>2nd Age</strong>
        </div>
        
        <button onclick="alert('Live data is currently blocked by CORS.\nWe are waiting for the server owner to enable it.')">
            REFRESH DATA
        </button>
        
        <p style="margin-top: 40px; color: #e8c070; font-size: 0.95em;">
            Showing latest known values from the test world.<br>
            Live updates will be enabled soon.
        </p>
    </div>
</body>
</html>
